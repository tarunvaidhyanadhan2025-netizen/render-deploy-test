version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    environment:
      - MODEL_PROVIDER=${MODEL_PROVIDER:-template}
      - MODEL_NAME=${MODEL_NAME:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - OCR_PROVIDER=${OCR_PROVIDER:-tesseract}
      - VECTOR_DB_ENABLED=${VECTOR_DB_ENABLED:-true}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/prescription_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prescription_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment for Ollama support
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  pgdata:
  # ollama_data:
